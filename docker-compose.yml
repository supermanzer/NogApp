######################################################################
# DOCKER-COMPOSE.YML - Production-ready container configuration
# This configuration uses Gunicorn as the application server and
# Nginx as the reverse proxy web server.
######################################################################

version: '3.8'

services:
  # Django application service
  django:
    restart: always
    build: ./nog_app/
    container_name: nog_django
    # Run the startup script and then gunicorn
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py create_superuser &&
        python manage.py collectstatic --noinput &&
        gunicorn --config /app/gunicorn_config.py nog_app.wsgi:application
      "
    volumes:
      # Mount app directory for code
      - ./nog_app:/app
      # Named volume for static files
      - static_volume:/app/staticfiles
      # Logs directory
      - ./nog_app/logs:/app/logs
    # Don't expose directly to host - only to nginx
    expose:
      - "8000"
    # Internal network communication only
    networks:
      - nog_network
    env_file:
      - .env
    environment:
      - DEBUG=False
      - PYTHONUNBUFFERED=1
      # Superuser credentials (set these in .env for production)
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-changeme}
    # Health check for the container
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy server
  nginx:
    restart: always
    build: ./nginx/
    container_name: nog_nginx
    volumes:
      # Mount nginx configuration - matches Dockerfile copy destination
      - ./nginx/nginx.conf:/etc/nginx/conf.d/nginx.conf
      # Serve static files from django volume
      - static_volume:/app/staticfiles
      # Logs directory
      - ./logs/nginx:/var/log/nginx
    # Expose to host
    ports:
      - "80:80"
      - "443:443"  # Ready for HTTPS
    # Depends on django being ready
    depends_on:
      django:
        condition: service_healthy
    networks:
      - nog_network
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Named volumes for persistent data
volumes:
  static_volume:

# Networks for service communication
networks:
  nog_network:
    driver: bridge

